name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  enable:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure Pages is configured for GitHub Actions
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          headers=(
            -H "Accept: application/vnd.github+json"
            -H "Authorization: Bearer ${GH_TOKEN}"
            -H "X-GitHub-Api-Version: 2026-03-10"
          )
          status=$(curl -sS -o /tmp/pages.json -w "%{http_code}" "${headers[@]}" "https://api.github.com/repos/${GH_REPO}/pages")
          if [ "$status" = "404" ]; then
            curl -sS -X POST "${headers[@]}" "https://api.github.com/repos/${GH_REPO}/pages" \
              -d '{"build_type":"workflow"}'
          elif [ "$status" = "200" ]; then
            curl -sS -X PUT "${headers[@]}" "https://api.github.com/repos/${GH_REPO}/pages" \
              -d '{"build_type":"workflow"}'
          else
            cat /tmp/pages.json
            exit 1
          fi

  build:
    runs-on: ubuntu-latest
    needs: enable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build -w @skillcheck/web
        env:
          SKILLCHECK_BASE: /skillcheck/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
